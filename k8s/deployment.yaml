apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app
        image: ghcr.io/cpuhyong/cicdtest:b7416798a922fe02f8ac2e4bf7136f71f268992f
        ports:
        - containerPort: 80
