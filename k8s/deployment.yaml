apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app
        image: ghcr.io/cpuhyong/cicdtest:a8baa3cf51e8d4e07b2b8204641be7fcfad8fd4b
        ports:
        - containerPort: 80
